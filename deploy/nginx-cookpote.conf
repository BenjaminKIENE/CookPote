# ============================================================
# Nginx vhost — cookpote.fr
# SSL géré par Certbot (Let's Encrypt) — déjà configuré.
# Ajouter dans /etc/nginx/sites-available/cookpote
# puis: ln -s /etc/nginx/sites-available/cookpote /etc/nginx/sites-enabled/
# ============================================================

# Redirect www → non-www
server {
    listen 80;
    listen 443 ssl;
    server_name www.cookpote.fr;

    ssl_certificate     /etc/letsencrypt/live/cookpote.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cookpote.fr/privkey.pem;

    return 301 https://cookpote.fr$request_uri;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name cookpote.fr;
    return 301 https://cookpote.fr$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name cookpote.fr;

    ssl_certificate     /etc/letsencrypt/live/cookpote.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cookpote.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Logs
    access_log /var/log/cookpote/nginx-access.log;
    error_log  /var/log/cookpote/nginx-error.log warn;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Upload size (for recipe images)
    client_max_body_size 6M;

    # ── API → Node.js backend ────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_read_timeout 30s;
    }

    # ── Health endpoint ──────────────────────────────────────
    location /health {
        proxy_pass       http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Uploaded images ──────────────────────────────────────
    location /uploads/ {
        alias /var/www/cookpote/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Angular SPA ──────────────────────────────────────────
    root /var/www/cookpote/frontend/dist/frontend/browser;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
